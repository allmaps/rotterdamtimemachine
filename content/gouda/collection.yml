- label: Kaart van Gouda
  title: Deze ruw geschetste kaart is gemaakt door Balthasar Florisz. van Berckenrode. Althans, dat moeten we aannemen. Nergens staat duidelijk genoteerd dat Van Berckenrode de maker is van deze kaart. De Nederlandse cartograaf is met name bekend van zijn plattegrond van Amsterdam die hij rond 1630 heeft gemaakt. Hij heeft ook meegewerkt aan het boek 'Theatrum sive Hollandiae Comitatus et Urbium nova descriptio', een boek waarin ook een kaart van Gouda is opgenomen.
