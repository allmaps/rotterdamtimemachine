- label: Kaart van Gouda binnen de singels
  title: Op deze kaart is het stadsplan van Gouda te zien uit de atlas van Braun en Hogenberg uit 1585. Het is een kostbare bron, omdat het de oudst gedrukte plattegrond van Gouda is. De plattegrond is hoogstwaarschijnlijk gebaseerd op gegevens die Pieter Dircxzoon Crabeth aangeleverd heeft. Pieter Dircxzoon is de vader van de wereldberoemde glazeniers Dirk en Wouter Crabeth, de makers van de Goudse Glazen in de Sint Janskerk.
