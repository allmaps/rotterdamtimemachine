  credits:
    title: Credits
    description: Rotterdam Time Machine is een open-source project geïnitieerd en beheerd door Allmaps, in samenwerking met het Stadsarchief Rotterdam. Het eerste prototype werd ontwikkeld als onderdeel van een stage van het Techniek College Rotterdam. De broncode is beschikbaar op GitHub en kan hergebruikt worden voor een tijdreis van een andere stad, zie bijvoorbeeld het Kaartenkabinet van de Gouda Tijdmachine.
